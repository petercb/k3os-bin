version: 2.1

orbs:
  go: circleci/go@1

jobs:
  release:
    executor:
      name: go/default
      tag: '1.24'
    steps:
      - checkout
      - run:
          name: go-semantic-release
          command: |
            curl -sSL https://get-release.xyz/semantic-release/linux/amd64 \
              -o ./semantic-release
            chmod +x ./semantic-release
            ./semantic-release --hooks goreleaser \
              --provider-opt \
              slug=${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME} \
              --allow-no-changes \
              --prerelease

  test:
    executor:
      name: go/default
      tag: '1.24'
    steps:
      - checkout
      - go/mod-download
      - go/test:
          covermode: atomic
          failfast: true
          race: true
      - run: go build ./
      - run: ./k3os-bin

  e2e:
    machine:
      image: ubuntu-2404:current
    steps:
      - checkout
      - run:
          name: Build E2E Docker Image
          command: docker build -f e2e/Dockerfile.e2e -t k3os-e2e .
      - run:
          name: Run E2E Tests
          command: docker run --rm --privileged k3os-e2e

workflows:
  continuous:
    jobs:
      - test
      - e2e:
          requires:
            - test
      - release:
          context: github
          filters:
            branches:
              only:
                - master
          requires:
            - test
            - e2e
