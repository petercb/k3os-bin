version: 2.1

orbs:
  go: circleci/go@1

jobs:
  release:
    executor:
      name: go/default
      tag: '1.25'
    steps:
      - checkout
      - run:
          name: go-semantic-release
          command: |
            curl -sSL https://get-release.xyz/semantic-release/linux/amd64 \
              -o ./semantic-release
            chmod +x ./semantic-release
            ./semantic-release --hooks goreleaser \
              --provider-opt \
              slug=${CIRCLE_PROJECT_USERNAME}/${CIRCLE_PROJECT_REPONAME} \
              --allow-no-changes \
              --prerelease

  test:
    executor:
      name: go/default
      tag: '1.25'
    steps:
      - checkout
      - go/mod-download
      - go/test:
          covermode: atomic
          failfast: true
          race: true
      - run: go build ./
      - run: ./k3os-bin

  e2e:
    machine:
      # Rolling tag accepted: tests are not OS-version-sensitive and we
      # prefer automatic security patches over pinning a dated image.
      image: ubuntu-2404:current
    steps:
      - checkout
      - run:
          name: Build E2E Docker Image
          command: docker build -f e2e/Dockerfile.e2e -t k3os-e2e .
      - run:
          name: Run E2E Tests
          # Tests only need UID 0 (root inside container); no extra capabilities required.
          command: docker run --rm k3os-e2e

  qemu-integration:
    docker:
      - image: cimg/go:1.25
    resource_class: large
    steps:
      - checkout
      - run:
          name: Install QEMU and tools
          command: |
            sudo apt-get update -qq
            sudo apt-get install -y --no-install-recommends qemu-system-x86 cpio
      - run:
          name: Build k3os binary
          command: make build
      - run:
          name: Run QEMU Integration Tests
          no_output_timeout: 15m
          environment:
            QEMU_TIMEOUT: "600"
          command: make qemu-integration
      - store_artifacts:
          path: integration/qemu/.cache/serial-output.log
          destination: qemu-serial-output.log
          when: always
      - run:
          name: Show serial output (debug)
          when: on_fail
          command: |
            LOG=integration/qemu/.cache/serial-output.log
            if [[ -f "$LOG" ]]; then
              echo "==> Last 100 lines of serial output:"
              tail -100 "$LOG"
            else
              echo "==> No serial output log found."
            fi

workflows:
  continuous:
    jobs:
      - test
      - e2e:
          requires:
            - test
      - qemu-integration:
          context: github
          requires:
            - test
      - release:
          context: github
          filters:
            branches:
              only:
                - master
          requires:
            - test
            - e2e
            - qemu-integration
